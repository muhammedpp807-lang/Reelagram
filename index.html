<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <title>Reelgram — Reels & Profiles</title>
  </head>
  <body class="bg-black">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx">
      // 1. Import the specific Firebase features you need
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

// 2. Your specific Reelagram configuration
const firebaseConfig = {
  apiKey: "AIzaSyCtBHVg3FI4C3i1WKl_iNpB9lS-xTOT73I",
  authDomain: "reelgram-6636b.firebaseapp.com",
  projectId: "reelgram-6636b",
  storageBucket: "reelgram-6636b.firebasestorage.app",
  messagingSenderId: "1019099169791",
  appId: "1:1019099169791:web:520d4ad670a4c00bd2ddca"
};

// 3. Initialize Firebase services
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app); // Initialized storage to handle reel file uploads!

console.log("🚀 Reelagram successfully linked to Firebase!");


      async function uploadReel(file, caption, user) {
  if (!file) return;

  try {
    // 1. Create a unique path inside Firebase Storage
    const fileRef = ref(storage, `reels/${Date.now()}_${file.name}`);
    
    // 2. Upload the raw video bytes
    console.log("Uploading video file...");
    const snapshot = await uploadBytes(fileRef, file);
    
    // 3. Grab the public download link from Storage
    const videoUrl = await getDownloadURL(snapshot.ref);
    
    // 4. Save the video reference metadata into Firestore database
    await addDoc(collection(db, "reels"), {
      username: user,
      caption: caption,
      videoUrl: videoUrl,
      createdAt: new Date(),
      likes: 0
    });
    
    console.log("🎬 Reel posted successfully to Reelagram feed!");
  } catch (error) {
    console.error("Error uploading reel:", error);
  }
}

// Expose globally if using inline HTML event handlers (onclick, etc.)
window.uploadReel = uploadReel;
    </script>
  </body>
</html>

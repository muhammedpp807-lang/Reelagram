// Helper function to convert a raw image file into a text string
function getBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}

// Function to handle the form submission
async function handlePostSubmission() {
  const fileInput = document.getElementById('reelFileInput');
  const captionInput = document.getElementById('reelCaptionInput');
  const file = fileInput.files[0];

  if (!file) {
    alert("Please select a photo first!");
    return;
  }

  // CRITICAL CHECK: Base64 strings can get massive. 
  // We must restrict users to small images/avatars (under 1MB) so Firestore doesn't reject it.
  if (file.size > 1024 * 1024) { 
    alert("File is too large! Free plan profile pictures must be under 1MB.");
    return;
  }

  try {
    console.log("Converting image to text format...");
    const base64String = await getBase64(file);

    console.log("Saving straight to Firestore...");
    await addDoc(collection(db, "posts")), {
      caption: captionInput.value.trim(),
      imageData: base64String, // The image is saved purely as text!
      createdAt: new Date()
    };

    alert("✨ Profile picture updated on your feed successfully!");
    fileInput.value = '';
    captionInput.value = '';
  } catch (error) {
    console.error("Error saving data:", error);
  }
}

// Expose to HTML buttons
window.handlePostSubmission = handlePostSubmission;
      

      async function uploadReel(file, caption, user) {
  if (!file) return;

  try {
    // 1. Create a unique path inside Firebase Storage
    const fileRef = ref(storage, `reels/${Date.now()}_${file.name}`);
    
    // 2. Upload the raw video bytes
    console.log("Uploading video file...");
    const snapshot = await uploadBytes(fileRef, file);
    
    // 3. Grab the public download link from Storage
    const videoUrl = await getDownloadURL(snapshot.ref);
    
    // 4. Save the video reference metadata into Firestore database
    await addDoc(collection(db, "reels"), {
      username: user,
      caption: caption,
      videoUrl: videoUrl,
      createdAt: new Date(),
      likes: 0
    });
    
    console.log("🎬 Reel posted successfully to Reelagram feed!");
  } catch (error) {
    console.error("Error uploading reel:", error);
  }
}

// Expose globally if using inline HTML event handlers (onclick, etc.)
window.uploadReel = uploadReel;
